<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <h1>SkyPulse</h1>
            <button id="themeToggle" class="theme-btn">🌙</button>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Search city..."
                >
                <button id="searchBtn">Search</button>
                <button id="locationBtn">📍</button>
            </div>
        </section>

        <!-- Current Weather Card -->
        <section class="weather-card glass">
            <div class="weather-top">
                <h2 id="cityName">Pune</h2>
                <span id="dateTime">Friday, 8:30 PM</span>
            </div>

            <div class="weather-main">
                <div class="temp">
                    <h1 id="temperature">28°C</h1>
                    <p id="condition">Cloudy</p>
                </div>

                <div class="weather-icon">
                    ☁️
                </div>
            </div>

            <div class="weather-details">
                <div>Humidity: <span id="humidity">78%</span></div>
                <div>Wind: <span id="wind">14 km/h</span></div>
                <div>Feels like: <span id="feelsLike">30°C</span></div>
            </div>
        </section>

        <!-- AQI Card -->
        <section class="aqi-card glass">
            <h3>Air Quality Index</h3>

            <div class="aqi-value" id="aqiValue">--</div>

            <p id="aqiStatus">Loading...</p>

            <div class="aqi-details">
                <p>PM2.5: <span id="pm25">--</span></p>
                <p>PM10: <span id="pm10">--</span></p>
                <p>CO: <span id="co">--</span></p>
            </div>
        </section>

        <!-- Forecast Section -->
        <section class="forecast-section">
            <h3>5-Day Forecast</h3>

            <div class="forecast-container">

                <div class="forecast-card glass">
                    <p>Mon</p>
                    <h4>29°C</h4>
                    <span>☀️</span>
                </div>

                <div class="forecast-card glass">
                    <p>Tue</p>
                    <h4>26°C</h4>
                    <span>🌧️</span>
                </div>

                <div class="forecast-card glass">
                    <p>Wed</p>
                    <h4>27°C</h4>
                    <span>⛅</span>
                </div>

            </div>
        </section>

        <!-- Search History -->
        <section class="history-section glass">
            <h3>Recent Searches</h3>
            <ul id="searchHistory">
                <li>Mumbai</li>
                <li>Bangalore</li>
                <li>Delhi</li>
            </ul>
        </section>

    </div>

    <script src="config.js"></script>
    <script src="components/aqi.js"></script>
    <script src="components/forecast.js"></script>
    <script src="components/background.js"></script>
    <script src="components/history.js"></script>
    <script src="components/weather.js"></script>
    <script src="components/geolocation.js"></script>
    <script src="components/theme.js"></script>
    <script src="script.js"></script>

</body>
</html>
